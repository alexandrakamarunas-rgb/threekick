<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KICK wear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; overflow:hidden; }

  #kc-cta{ transition:opacity .15s ease; }
  #kc-cta:hover{ opacity:.55; }
  #kc-arrows button{ transition:opacity .15s ease; }
  #kc-arrows button:hover{ opacity:.5; }

  @media (max-width:640px){
    #kc-header{ padding:22px 18px!important; }
    #kc-nav{ display:none!important; }
    #kc-menu{ display:flex!important; font-size:19px!important; font-weight:800!important; letter-spacing:.05em!important; }
    #kc-menu i{ width:26px!important; height:3px!important; }
    #kc-hmark{ display:none!important; }
    #kc-cart{ font-size:19px!important; font-weight:800!important; letter-spacing:.05em!important; }
    #kc-root>.kc-slide{ top:28%!important; bottom:auto!important; height:72%!important; width:100%!important; object-position:50% 100%!important; }
    #kc-root #kc-hero{ object-position:55% 0%!important; }
    #kc-info{ top:100px!important; left:18px!important; max-width:58%!important; }
    #kc-info h1{ font-size:25px!important; line-height:1.08!important; }
    #kc-spec{ font-size:14px!important; margin-top:12px!important; }
    #kc-desc-d{ display:none!important; }
    #kc-sizes{ display:none!important; }
    #kc-desc-m{ display:block!important; position:absolute!important; right:18px!important; top:43%!important; text-align:right!important; font-size:15px!important; font-weight:700!important; max-width:52%!important; z-index:30!important; color:inherit!important; }
    #kc-pager{ right:18px!important; top:26%!important; }
    #kc-arrows{ font-size:22px!important; gap:24px!important; }
    #kc-count{ font-size:42px!important; font-weight:700!important; letter-spacing:-.01em!important; }
    #kc-cta{ left:auto!important; right:22px!important; bottom:17%!important; width:80px!important; height:80px!important; }
    #kc-word{ left:0!important; right:0!important; transform:none!important; width:100%!important; bottom:auto!important; top:57%!important; padding:0 12px!important; gap:0!important; flex-direction:row!important; justify-content:space-between!important; align-items:flex-end!important; }
    #kc-kick{ height:9vw!important; }
    #kc-wearbox{ height:9vw!important; }
    #kc-wear{ font-size:18vw!important; transform:translateY(-0.34em)!important; }
    #kc-footer{ padding:0 18px 16px!important; font-size:10px!important; }
    #kc-foot-left{ gap:16px!important; }
    #kc-foot-right{ display:none!important; }
  }
</style>
</head>
<body>

<div id="kc-root" style="position:relative; width:100%; height:100vh; min-height:560px; overflow:hidden; font-family:'Archivo',sans-serif; background:#0A0A0A; transition:color .35s ease, background-color .45s ease;">

  <!-- PHOTO LAYERS -->
  <img class="kc-slide" id="kc-hero" src="project/assets/hero-cutout.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-tee-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-grey-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-black-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-vest-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-hoodie-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-tee2-waist.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />
  <img class="kc-slide" src="project/assets/wear-guards-trim.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .5s ease; z-index:1; pointer-events:none;" />

  <!-- MOBILE NAV OVERLAY -->
  <div id="kc-mobile-nav" style="display:none; position:fixed; inset:0; z-index:200; background:#0A0A0A; color:#EDEDEA; flex-direction:column; padding:0 24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; height:64px; border-bottom:1px solid #2a2a2a; margin-bottom:8px;">
      <span style="font-size:13px; font-weight:700; letter-spacing:.08em;">MENIU</span>
      <button onclick="toggleMenu(event)" style="background:none; border:none; color:#EDEDEA; font-size:32px; line-height:1; cursor:pointer; padding:4px;">×</button>
    </div>
    <a href="index.html" style="color:#EDEDEA; text-decoration:none; font-size:28px; font-weight:800; letter-spacing:.03em; padding:18px 0; border-bottom:1px solid #1a1a1a;">HOME</a>
    <a href="parduotuve.html" style="color:#EDEDEA; text-decoration:none; font-size:28px; font-weight:800; letter-spacing:.03em; padding:18px 0; border-bottom:1px solid #1a1a1a;">PARDUOTUVĖ</a>
    <a href="komandoms.html" style="color:#EDEDEA; text-decoration:none; font-size:28px; font-weight:800; letter-spacing:.03em; padding:18px 0; border-bottom:1px solid #1a1a1a;">KOMANDOMS</a>
  </div>

  <!-- HEADER -->
  <header id="kc-header" style="position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center; justify-content:space-between; padding:26px 40px; color:inherit;">
    <button id="kc-menu" onclick="toggleMenu(event)" style="display:none; align-items:center; gap:12px; color:inherit; background:none; border:none; cursor:pointer; font-family:'Archivo',sans-serif; font-size:13px; font-weight:700; letter-spacing:.08em;">
      <span style="display:flex; flex-direction:column; gap:4px; width:20px;">
        <i style="height:2px; background:currentColor; display:block;"></i>
        <i style="height:2px; background:currentColor; display:block;"></i>
      </span>
      MENIU
    </button>
    <nav id="kc-nav" style="display:flex; align-items:center; gap:34px; font-size:13px; font-weight:700; letter-spacing:.08em;">
      <a href="index.html" style="color:inherit; text-decoration:none;">HOME</a>
      <a href="parduotuve.html" style="color:inherit; text-decoration:none;">PARDUOTUVĖ</a>
      <a href="komandoms.html" style="color:inherit; text-decoration:none;">KOMANDOMS</a>
    </nav>
    <div style="display:flex; align-items:center; gap:30px; font-size:13px; font-weight:700; letter-spacing:.08em;">
      <span id="kc-hmark" style="display:flex; align-items:flex-start; gap:4px;">
        <span style="height:17px; aspect-ratio:768/211; background:currentColor; -webkit-mask:url('project/assets/kick-logo.png') center/contain no-repeat; mask:url('project/assets/kick-logo.png') center/contain no-repeat; display:block;"></span>
        <span style="font-size:9px; font-weight:600;">®</span>
      </span>
      <a id="kc-cart" href="#" style="color:inherit; text-decoration:none;">KREPŠELIS</a>
    </div>
  </header>

  <!-- LEFT INFO STACK -->
  <div id="kc-info" style="position:absolute; left:40px; top:124px; z-index:30; color:inherit; max-width:320px;">
    <h1 id="kc-name" style="margin:0; font-size:clamp(26px,2.6vw,36px); font-weight:800; line-height:1.02; letter-spacing:-.01em; text-transform:uppercase; white-space:pre-line;"></h1>
    <div id="kc-spec" style="margin-top:16px; font-size:13px; font-weight:600; line-height:1.45; letter-spacing:.02em;"></div>
    <div id="kc-sizes" style="margin-top:18px;">
      <div style="font-size:11px; font-weight:700; letter-spacing:.12em; margin-bottom:9px; opacity:.8;">DYDŽIŲ TINKLELIS</div>
      <div style="display:flex; gap:7px; flex-wrap:wrap;">
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">S</span>
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">M</span>
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">L</span>
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">XL</span>
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">XXL</span>
        <span style="min-width:34px; text-align:center; padding:7px 4px; border:1px solid currentColor; font-size:12px; font-weight:700; letter-spacing:.03em;">XXXL</span>
      </div>
    </div>
    <div id="kc-desc-d" style="margin-top:0;">
      <div style="width:20px; height:2px; background:currentColor; margin:22px 0 14px;"></div>
      <p id="kc-desc-text" style="margin:0; max-width:240px; font-size:12.5px; font-weight:600; line-height:1.45; letter-spacing:.01em;"></p>
    </div>
  </div>

  <!-- MOBILE DESC (right side, slide 0 only) -->
  <div id="kc-desc-m" style="display:none; color:inherit;"></div>

  <!-- PAGINATION -->
  <div id="kc-pager" style="position:absolute; right:40px; top:42%; z-index:30; color:inherit; display:flex; flex-direction:column; align-items:flex-end; gap:14px;">
    <div id="kc-arrows" style="display:flex; gap:18px; font-size:24px; line-height:1;">
      <button onclick="go(-1)" aria-label="Atgal" style="background:none; border:none; color:inherit; cursor:pointer; padding:4px; font-family:'Archivo',sans-serif;">←</button>
      <button onclick="go(1)" aria-label="Pirmyn" style="background:none; border:none; color:inherit; cursor:pointer; padding:4px; font-family:'Archivo',sans-serif;">→</button>
    </div>
    <div id="kc-count" style="font-size:13px; font-weight:600; letter-spacing:.1em; white-space:nowrap;"><span id="kc-current">01</span> / <span id="kc-total">08</span></div>
  </div>

  <!-- CIRCLE CTA -->
  <button id="kc-cta" onclick="go(1)" style="position:absolute; left:54%; bottom:30%; z-index:25; width:128px; height:128px; border-radius:50%; border:1px solid currentColor; background:transparent; color:inherit; cursor:pointer; font-size:30px; line-height:1;">↗</button>

  <!-- FIXED WORDMARK -->
  <div id="kc-word" style="position:absolute; left:0; right:0; bottom:13%; z-index:20; display:flex; justify-content:space-between; align-items:flex-end; padding:0 24px; pointer-events:none; color:inherit;">
    <span id="kc-kick" style="height:clamp(58px,8.4vw,132px); aspect-ratio:731/172; background:currentColor; -webkit-mask:url('project/assets/kick-logo-tight.png') left bottom/contain no-repeat; mask:url('project/assets/kick-logo-tight.png') left bottom/contain no-repeat; display:block;"></span>
    <div id="kc-wearbox" style="height:clamp(58px,8.4vw,132px); width:max-content; overflow:hidden;">
      <div id="kc-wear" style="font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:calc(clamp(58px,8.4vw,132px) * 2); line-height:1; letter-spacing:-.02em; white-space:nowrap; transform:translateY(-0.34em);">wear</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer id="kc-footer" style="position:absolute; bottom:0; left:0; right:0; z-index:30; padding:0 40px 16px; display:flex; align-items:center; justify-content:space-between; color:inherit; font-size:11px; font-weight:600; letter-spacing:.03em;">
    <div id="kc-foot-left" style="display:flex; align-items:center; gap:22px; white-space:nowrap;">
      <a href="#" style="color:inherit; text-decoration:none;">Pirkimo pardavimo taisyklės</a>
      <a href="#" style="color:inherit; text-decoration:none;">Privatumo politika</a>
      <a href="#" style="color:inherit; text-decoration:none;">Grąžinimas</a>
    </div>
    <div id="kc-foot-right" style="display:flex; align-items:center; gap:20px; white-space:nowrap;">
      <a href="https://instagram.com" aria-label="Instagram" style="color:inherit; display:flex; align-items:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"></rect>
          <circle cx="12" cy="12" r="4.2"></circle>
          <circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"></circle>
        </svg>
      </a>
      <a href="mailto:info@threekickwear.com" style="color:inherit; text-decoration:none;">info@threekickwear.com</a>
      <a href="tel:+37066181111" style="color:inherit; text-decoration:none;">+370 661 81111</a>
    </div>
  </footer>

</div>

<script>
  const slides = [
    { color:'#F3DE1B', bg:'#D32528', pos:'55% 30%',    fit:'cover',   name:'Medvilninis\ndžemperis',   specB:'Kirpimas: tiesus',                   desc:'100% medvilnė.' },
    { color:'#FFFFFF', bg:'#0A0A0A', pos:'center bottom', fit:'contain', name:'Oversize\nmarškinėliai',   specB:'Medvilna 100%',                      desc:'320gsm. Heavyweight. Storo audinio marškinėliai su KICK logotipu.' },
    { color:'#0A0A0A', bg:'#EDEDEA', pos:'center bottom', fit:'contain', name:'Pilkas\nkomplektas',        specB:'Džemperis su gobtuvu ir kelnės',      desc:'Minkštas flisas su šiltu vidumi. Komplektas treniruotėms ir laisvalaikiui.' },
    { color:'#D32528', bg:'#F2C200', pos:'center bottom', fit:'contain', name:'Juodas\nkomplektas',        specB:'Džemperis su gobtuvu ir kelnės',      desc:'Klasikinis juodas komplektas. Sodri spalva, tvirtos siūlės ir taisyklingas kritimas.' },
    { color:'#F4F1EA', bg:'#2A211C', pos:'center bottom', fit:'contain', name:'Pūkinė\nliemenė',           specB:'Liemenė ir kepurė',                  desc:'Lengvas šiltinimas be rankovių ir vėjui atspari išorė. Sluoksnis šaltoms dienoms.' },
    { color:'#0A0A0A', bg:'#F2C200', pos:'center bottom', fit:'contain', box:{bottom:'0',left:'0',width:'100%',height:'120%'}, name:'Raudonas\ndžemperis', specB:'Džemperis su gobtuvu', desc:'Klasikinis gobtuvas su priekine kišene. Sodri spalva ir minkštas flisas kasdienai.' },
    { color:'#FFFFFF', bg:'#0A0A0A', pos:'center bottom', fit:'contain', name:'Marškinėlių\nkomplektas',   specB:'3 vienetai komplekte',                desc:'threekick marškinėliai (3 vnt.) 180gsm. medvilnė. Lengvos, kvėpuoja.' },
    { color:'#FFFFFF', bg:'#3A3A37', pos:'center',       fit:'contain', box:{top:'5%',left:'5%',width:'90%',height:'90%'}, name:'Blauzdų\napsaugos', specB:'Korinė apsauga, 1 pora', desc:'Korinės struktūros apsaugos. Maksimali apsauga, lengvai plaunamos ir naudojamos.' },
  ];

  let idx = 0;
  let wheelLock = false;

  const imgs = Array.from(document.querySelectorAll('#kc-root .kc-slide'));

  function apply() {
    const s = slides[idx];
    const root = document.getElementById('kc-root');
    root.style.color = s.color;
    root.style.backgroundColor = s.bg;

    imgs.forEach((img, k) => { img.style.opacity = k === idx ? '1' : '0'; });

    // Size grid: hide on shin guards slide
    const sizesEl = document.getElementById('kc-sizes');
    if (sizesEl) sizesEl.style.display = (idx === 7) ? 'none' : '';

    // White tee slide (idx 1): logo + wear in brand red on all viewports
    const kickEl = document.getElementById('kc-kick');
    const wearEl = document.getElementById('kc-wear');
    if (kickEl && wearEl) {
      if (idx === 1 || idx === 6) {
        kickEl.style.setProperty('background', '#D32528', 'important');
        wearEl.style.setProperty('color', '#D32528', 'important');
      } else {
        kickEl.style.setProperty('background', 'currentColor');
        wearEl.style.removeProperty('color');
      }
    }

    // Update text
    document.getElementById('kc-name').textContent = s.name;
    document.getElementById('kc-spec').textContent = s.specB;
    document.getElementById('kc-desc-text').textContent = s.desc;
    document.getElementById('kc-desc-m').textContent = s.desc;
    document.getElementById('kc-current').textContent = String(idx + 1).padStart(2, '0');

    // Mobile: desc side logic — right on slide 0 (red hero), left on all others
    const isMobile = window.matchMedia('(max-width:640px)').matches;
    if (isMobile) {
      const descD = document.getElementById('kc-desc-d');
      const descM = document.getElementById('kc-desc-m');
      if (idx === 0) {
        descD.style.setProperty('display', 'none', 'important');
        descM.style.setProperty('display', 'block', 'important');
      } else {
        descD.style.setProperty('display', 'block', 'important');
        descM.style.setProperty('display', 'none', 'important');
      }
    }
  }

  function go(dir) {
    idx = (idx + dir + slides.length) % slides.length;
    apply();
  }

  function init() {
    // Apply per-slide image position/fit and box overrides
    imgs.forEach((img, k) => {
      img.style.objectPosition = slides[k].pos;
      img.style.objectFit = slides[k].fit;
      const box = slides[k].box;
      if (box) {
        img.style.top    = box.top    !== undefined ? box.top    : 'auto';
        img.style.bottom = box.bottom !== undefined ? box.bottom : 'auto';
        img.style.left   = box.left   !== undefined ? box.left   : 'auto';
        img.style.right  = 'auto';
        img.style.width  = box.width;
        img.style.height = box.height;
      }
    });

    document.getElementById('kc-total').textContent = String(slides.length).padStart(2, '0');
    apply();

    // Scroll wheel navigation
    document.getElementById('kc-root').addEventListener('wheel', (e) => {
      e.preventDefault();
      if (wheelLock) return;
      wheelLock = true;
      go(e.deltaY > 0 ? 1 : -1);
      setTimeout(() => { wheelLock = false; }, 650);
    }, { passive: false });

    // Keyboard navigation
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') go(1);
      else if (e.key === 'ArrowLeft') go(-1);
    });

    // Touch swipe navigation
    let touchStartX = 0, touchStartY = 0;
    const root = document.getElementById('kc-root');
    root.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    root.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
      if (Math.abs(dx) >= Math.abs(dy)) {
        go(dx < 0 ? 1 : -1);
      } else {
        go(dy < 0 ? 1 : -1);
      }
    }, { passive: true });
  }

  let menuOpen = false;
  function toggleMenu(e) {
    if (e) e.preventDefault();
    menuOpen = !menuOpen;
    const nav = document.getElementById('kc-mobile-nav');
    nav.style.display = menuOpen ? 'flex' : 'none';
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
